                const totalPoints = rawData.reduce((sum, j) => sum + j.points, 0);

                    const effectivePoints = j.points * penaltyMultiplier;
                    totalEffectivePoints += effectivePoints;
                    return { ...j, effectivePoints };
                });

                const dataWithDynamic = dataWithEffective.map(j => {
                    // Part des points effectifs dans le total
                    let currentPerfShare = totalEffectivePoints > 0 ? (j.effectivePoints / totalEffectivePoints) * 100 : j.baseProba;
                    
                    // Bonus d'expérience (0.8 par saison, 2.5 par titre)

                    return { ...j, rawDynamic };
                });

                const sumDyn = dataWithDynamic.reduce((sum, j) => sum + j.rawDynamic, 0);

                    let probaTitre = parseFloat(((j.rawDynamic / sumDyn) * 100).toFixed(1));

                                            <h4 className="text-white font-bold mt-4 mb-2 text-sm">Constructeurs</h4>
                                            <div className="space-y-1 text-sm text-slate-300">
                                                <div className="flex justify-between"><span>Aucun pilote en Q2</span> <span className="text-red-400">-1 pt</span></div>
                                                <div className="flex justify-between"><span>1 pilote en Q2</span> <span className="text-emerald-400">+1 pt</span></div>
                                                <div className="flex justify-between"><span>2 pilotes en Q2</span> <span className="text-emerald-400">+3 pts</span></div>
                                                <div className="flex justify-between"><span>1 pilote en Q3</span> <span className="text-emerald-400">+5 pts</span></div>
                                                <div className="flex justify-between"><span>2 pilotes en Q3</span> <span className="text-emerald-400">+10 pts</span></div>
                                                <div className="flex justify-between"><span>Pilote Disqualifié</span> <span className="text-red-400">-5 pts/pilote</span></div>
                                            </div>
                                        </div>

                                        {/* COURSE */}
                                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                            <h3 className="text-white font-bold mb-4 border-b border-slate-800 pb-2">Course (Pilotes)</h3>
                                            <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-sm text-slate-300 mb-4">
                                                <div className="flex justify-between"><span>1ère place</span> <span className="font-bold text-emerald-400">25 pts</span></div>
                                                <div className="flex justify-between"><span>2ème place</span> <span className="font-bold text-emerald-400">18 pts</span></div>
                                                <div className="flex justify-between"><span>3ème place</span> <span className="font-bold text-emerald-400">15 pts</span></div>
                                                <div className="flex justify-between"><span>4ème place</span> <span className="font-bold text-emerald-400">12 pts</span></div>
                                                <div className="flex justify-between"><span>5ème place</span> <span className="font-bold text-emerald-400">10 pts</span></div>
                                                <div className="flex justify-between"><span>6ème place</span> <span className="font-bold text-emerald-400">8 pts</span></div>
                                                <div className="flex justify-between"><span>7ème place</span> <span className="font-bold text-emerald-400">6 pts</span></div>
                                                <div className="flex justify-between"><span>8ème place</span> <span className="font-bold text-emerald-400">4 pts</span></div>
                                                <div className="flex justify-between"><span>9ème place</span> <span className="font-bold text-emerald-400">2 pts</span></div>
                                                <div className="flex justify-between"><span>10ème place</span> <span className="font-bold text-emerald-400">1 pt</span></div>
                                                <div className="flex justify-between col-span-2 mt-2"><span>Tour le plus rapide</span> <span className="font-bold text-purple-400">10 pts</span></div>
                                                <div className="flex justify-between col-span-2"><span>Pilote du jour</span> <span className="font-bold text-yellow-400">10 pts</span></div>
                                                <div className="flex justify-between col-span-2"><span>Positions gagnées</span> <span className="font-bold text-emerald-400">1 pt/pos</span></div>
                                                <div className="flex justify-between col-span-2"><span>Dépassement réussi</span> <span className="font-bold text-emerald-400">1 pt/dép.</span></div>
                                                <div className="flex justify-between col-span-2"><span>Positions perdues</span> <span className="font-bold text-red-400">-1 pt/pos</span></div>
                                                <div className="flex justify-between col-span-2 border-t border-slate-800 pt-2"><span>DNF/Non classé</span> <span className="font-bold text-red-500">-20 pts</span></div>
                                            </div>

                                            <h4 className="text-white font-bold mt-4 mb-2 text-sm">Pitstops (Constructeurs)</h4>
                                            <div className="space-y-1 text-sm text-slate-300">
                                                <div className="flex justify-between"><span>Moins de 2s</span> <span className="text-emerald-400">20 pts</span></div>
                                                <div className="flex justify-between"><span>2s - 2.19s</span> <span className="text-emerald-400">10 pts</span></div>
                                                <div className="flex justify-between"><span>2.20s - 2.49s</span> <span className="text-emerald-400">5 pts</span></div>
                                                <div className="flex justify-between"><span>Fastest Pitstop</span> <span className="text-purple-400">5 pts</span></div>
                                                <div className="flex justify-between"><span>Nouveau Record WR</span> <span className="text-yellow-400">+15 pts</span></div>
                                            </div>
                                        </div>

                                        {/* SPRINT */}
                                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                            <h3 className="text-white font-bold mb-4 border-b border-slate-800 pb-2">Sprint</h3>
                                            <div className="space-y-1 text-sm text-slate-300">
                                                <div className="flex justify-between"><span>1er à 8ème</span> <span className="text-emerald-400">8 à 1 pts</span></div>
                                                <div className="flex justify-between"><span>Pos. décrochées/perdues</span> <span className="text-slate-400">±1 pt/pos</span></div>
                                                <div className="flex justify-between"><span>Dépassements réussis</span> <span className="text-emerald-400">1 pt/dép.</span></div>
                                                <div className="flex justify-between"><span>Tour le plus rapide</span> <span className="text-purple-400">5 pts</span></div>
                                                <div className="flex justify-between border-t border-slate-800 pt-1 mt-1"><span>DNF/Non classé</span> <span className="font-bold text-red-500">-10 pts</span></div>
                                                <div className="flex justify-between"><span>Constructeur Disqualifié</span> <span className="font-bold text-red-500">-10 pts/pilote</span></div>
                                            </div>
                                        </div>

                                        {/* ECONOMIE */}
                                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6">
                                            <h3 className="text-white font-bold mb-4 border-b border-slate-800 pb-2">Économie & Transferts</h3>
                                            <div className="space-y-3 text-sm text-slate-300">
                                                <p><strong>Tarification dynamique :</strong> Profitez des changements de prix en temps réel pour augmenter votre budget initial de 100M$.</p>
                                                <p><strong>Transferts :</strong> 2 transferts gratuits par course. <span className="text-red-400">Pénalité de -10 pts</span> par transfert supplémentaire. (Un transfert gratuit inutilisé est reporté).</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: RADIO PADDOCK */}
                            {activeTab === 'drama' && (
                                <div className="space-y-6 animate-in fade-in duration-500">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-2xl font-black text-white uppercase tracking-tight">Radio Paddock</h2>
                                            <p className="text-slate-400 text-sm">Messages de la direction de course et coups bas en direct.</p>
                                        </div>
                                    </div>

                                    <div className="space-y-4 border-l-2 border-slate-800 ml-4 pl-6 relative py-2">
                                        {paddockNews.map((news, i) => (
                                            <div key={i} className="relative group">
                                                <div className={`absolute -left-[31px] top-1 w-3 h-3 rounded-full border-2 border-slate-950 transition-transform group-hover:scale-125
                                                    ${news.type === 'drama' ? 'bg-red-500' : news.type === 'exploit' ? 'bg-emerald-500' : news.type === 'rookie' ? 'bg-blue-500' : 'bg-yellow-500'}
                                                `}></div>
                                                
                                                <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-sm hover:border-slate-700 transition-colors">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <span className="text-xs font-bold text-slate-500">{news.time}</span>
                                                        <span className={`text-[10px] uppercase font-black px-2 py-0.5 rounded
                                                            ${news.type === 'drama' ? 'bg-red-500/10 text-red-500' : 
                                                            news.type === 'exploit' ? 'bg-emerald-500/10 text-emerald-400' : 
                                                            news.type === 'rookie' ? 'bg-blue-500/10 text-blue-400' :
                                                            'bg-yellow-500/10 text-yellow-400'}
                                                        `}>
                                                            {news.type}
                                                        </span>
                                                    </div>
                                                    <p className="text-slate-300 italic">"{news.text}"</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                        </main>
                    </div>
                </div>
            );
        }

        // --- DEMARRAGE DE L'APPLICATION ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
