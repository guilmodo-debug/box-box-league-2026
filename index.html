                    <a href={CANAL_LINK} target="_blank" rel="noopener noreferrer" className="block bg-black border-b border-slate-800 text-white flex justify-center items-center py-2 px-4 hover:bg-slate-900 transition-colors group">
                        <span className="font-black italic tracking-tighter mr-3 text-lg">CANAL+</span>
                        <span className="text-sm text-slate-400 group-hover:text-white transition-colors">Diffuseur Officiel de la F1® - Suivez toute la saison en direct ! 📺</span>
                    </a>

                    {/* MAIN LAYOUT */}
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* SIDEBAR NAVIGATION */}
                        <aside className="lg:col-span-3 space-y-2">
                            {navItems.map(item => {
                                const isSpecial = item.id === 'inscription';
                                const isActive = activeTab === item.id;
                                
                                let btnClass = isActive 
                                    ? (isSpecial ? 'bg-blue-600 border border-blue-500 text-white shadow-md shadow-blue-500/20' : 'bg-slate-800 border border-slate-700 text-white shadow-md')
                                    : (isSpecial ? 'bg-blue-900/20 border border-blue-800/50 text-blue-400 hover:bg-blue-800/40 hover:text-blue-300' : 'text-slate-400 hover:bg-slate-900 hover:text-slate-200 border border-transparent');

                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 font-medium ${btnClass}`}
                                    >
                                        <div className={isActive && !isSpecial ? 'text-red-500' : ''}>
                                            {item.icon}
                                        </div>
                                        {item.label}
                                    </button>
                                );
                            })}

                            {/* LIEN CACHÉ POUR LES PROS (EASTER EGG) */}
                            <div className="pt-12">
                                <a 
                                    href="https://f1fantasytools.com/budget-builder" 
                                    target="_blank" 
                                    rel="noopener noreferrer"
                                    className="flex items-center justify-between px-4 py-2 mt-4 rounded-lg text-slate-700 hover:text-slate-300 hover:bg-slate-900/60 transition-all duration-500 text-[10px] uppercase font-black tracking-widest group border border-transparent hover:border-slate-800"
                                    title="Outil secret : Simulateur de budget et compositions"
                                >
                                    <span className="opacity-40 group-hover:opacity-100 transition-opacity">Pour les Pros seulement...</span>
                                    <ExternalLinkIcon className="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity text-fuchsia-500" />
                                </a>
                            </div>
                        </aside>

                        {/* CONTENT AREA */}
                        <main className="lg:col-span-9">

                            {/* TAB: PRINCIPE DU JEU (NOUVEAU) */}
                            {activeTab === 'principe' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-end mb-8">
                                        <div>
                                            <h2 className="text-2xl font-black text-white uppercase tracking-tight">Le Principe du Jeu</h2>
                                            <p className="text-slate-400 text-sm">Nouveau dans le paddock ? Voici tout ce qu'il faut savoir pour gérer votre écurie F1 Fantasy.</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        {/* BLOC 1 */}
                                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 hover:border-blue-500/50 transition-colors">
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="w-10 h-10 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center border border-blue-500/50"><UsersIcon className="w-5 h-5"/></div>
                                                <h3 className="text-lg font-bold text-white">1. Votre Écurie & Budget</h3>
                                            </div>
                                            <p className="text-slate-300 text-sm leading-relaxed">
                                                Vous prenez les rênes avec un budget initial de <strong className="text-emerald-400">100 millions de dollars</strong>. Votre mission : sélectionner <strong>5 Pilotes</strong> et <strong>2 Constructeurs</strong> (écuries) sans dépasser ce plafond. Tout au long de la saison, la valeur de vos pilotes et écuries montera ou descendra en fonction de leurs performances !
                                            </p>
                                        </div>

                                        {/* BLOC 2 */}
                                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 hover:border-emerald-500/50 transition-colors">
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="w-10 h-10 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center border border-emerald-500/50"><TrendingUpIcon className="w-5 h-5"/></div>
                                                <h3 className="text-lg font-bold text-white">2. Le Scoring (Les Points)</h3>
                                            </div>
                                            <p className="text-slate-300 text-sm leading-relaxed">
                                                Votre équipe marque des points basés sur les <strong>résultats réels</strong> des Grands Prix (Qualifications, Course, Sprints). Vous gagnez des points pour les dépassements, la pôle position, ou le tour le plus rapide... Mais attention : <span className="text-red-400 font-bold">les abandons (DNF) et disqualifications coûtent de lourdes pénalités</span> !
                                            </p>
                                        </div>

                                        {/* BLOC 3 */}
                                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 hover:border-yellow-500/50 transition-colors">
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="w-10 h-10 rounded-full bg-yellow-500/20 text-yellow-400 flex items-center justify-center border border-yellow-500/50"><RefreshCwIcon className="w-5 h-5"/></div>
                                                <h3 className="text-lg font-bold text-white">3. Gestion & Transferts</h3>
                                            </div>
                                            <p className="text-slate-300 text-sm leading-relaxed">
                                                Entre chaque course, vous pouvez ajuster votre équipe grâce à <strong>2 transferts gratuits</strong>. Un transfert gratuit non utilisé est reporté à la course suivante (max 3 cumulés). Si vous dépassez cette limite, chaque changement supplémentaire vous infligera <strong className="text-red-400">-10 points</strong> au championnat.
                                            </p>
                                        </div>

                                        {/* BLOC 4 */}
                                        <div className="bg-slate-900 border border-slate-800 rounded-2xl p-6 hover:border-fuchsia-500/50 transition-colors">
                                            <div className="flex items-center gap-3 mb-4">
                                                <div className="w-10 h-10 rounded-full bg-fuchsia-500/20 text-fuchsia-400 flex items-center justify-center border border-fuchsia-500/50"><ZapIcon className="w-5 h-5"/></div>
                                                <h3 className="text-lg font-bold text-white">4. Boosters & Jetons</h3>
                                            </div>
                                            <p className="text-slate-300 text-sm leading-relaxed">
                                                Désignez un pilote "DRS Boost" à chaque course pour <strong>doubler ses points</strong>. De plus, vous disposez de <strong>6 "Chips" tactiques</strong> utilisables une seule fois dans l'année (Boost 3X, Pilote Auto, Sans Limites...). Visitez l'onglet <em className="text-slate-400">Stratégie Boosters</em> pour devenir un fin tacticien.
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-center mt-8">
                                        <button onClick={() => setActiveTab('inscription')} className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-blue-500/20 transition-all hover:-translate-y-1">
                                            Je suis prêt, je m'inscris !
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* TAB 0: CLASSEMENT */}
                            {activeTab === 'classement' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-2xl font-black text-white uppercase tracking-tight">Championnat (Live)</h2>
                                            <p className="text-slate-400 text-sm">Le classement en temps réel. Gérez votre budget et vos boosters.</p>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse min-w-[700px]">
                                                <thead>
                                                    <tr className="bg-slate-950/50 text-xs uppercase tracking-wider text-slate-500 border-b border-slate-800">
                                                        <th className="px-6 py-4 font-semibold w-12 text-center">Pos</th>
                                                        <th className="px-6 py-4 font-semibold">Écurie / Pilote</th>
                                                        <th className="px-6 py-4 font-semibold text-center">Points</th>
                                                        <th className="px-6 py-4 font-semibold text-center">Budget</th>
                                                        <th className="px-6 py-4 font-semibold text-center">Boosters Disponibles</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-800">
                                                    {classementData.map((joueur, index) => (
                                                        <tr key={joueur.id} className="hover:bg-slate-800/50 transition-colors">
                                                            <td className="px-6 py-4 text-center">
                                                                <span className={`font-black text-lg ${index === 0 ? 'text-yellow-400' : index === 1 ? 'text-slate-300' : index === 2 ? 'text-orange-400' : 'text-slate-500'}`}>
                                                                    {index + 1}
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4">
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-2xl" title={joueur.statut}>{joueur.statut}</span>
                                                                    <div className="flex flex-col">
                                                                        <span className="font-bold text-white text-base">{joueur.nom}</span>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4 text-center">
                                                                <span className="font-mono text-xl font-black text-white">{joueur.points}</span>
                                                            </td>
                                                            <td className="px-6 py-4 text-center">
                                                                <span className="font-mono font-medium text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded border border-emerald-400/20">
                                                                    ${joueur.budget.toFixed(1)}M
                                                                </span>
                                                            </td>
                                                            <td className="px-6 py-4">
                                                                <div className="flex items-center justify-center gap-2">
                                                                    <ChipBadge type="3X" used={joueur.usedBoosters.includes('3X')} onClick={() => setActiveTab('boosters')} />
                                                                    <ChipBadge type="Limitless" used={joueur.usedBoosters.includes('Limitless')} onClick={() => setActiveTab('boosters')} />
                                                                    <ChipBadge type="NoNegative" used={joueur.usedBoosters.includes('NoNegative')} onClick={() => setActiveTab('boosters')} />
                                                                    <ChipBadge type="Wildcard" used={joueur.usedBoosters.includes('Wildcard')} onClick={() => setActiveTab('boosters')} />
                                                                    <ChipBadge type="Autopilot" used={joueur.usedBoosters.includes('Autopilot')} onClick={() => setActiveTab('boosters')} />
                                                                    <ChipBadge type="FinalFix" used={joueur.usedBoosters.includes('FinalFix')} onClick={() => setActiveTab('boosters')} />
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: WHINES */}
                            {activeTab === 'whines' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-2xl font-black text-white uppercase tracking-tight">Le Mur des Pleureuses</h2>
                                            <p className="text-slate-400 text-sm">Le classement officiel de la mauvaise foi. 1 râlerie = 1 point. Qui sera le champion des pleurs ?</p>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl p-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                            {[...data].sort((a,b) => b.whines - a.whines).map((joueur, i) => (
                                                <div key={joueur.id} className="flex items-center justify-between p-4 rounded-xl bg-slate-950 border border-slate-800 hover:border-orange-500/50 transition-colors group">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-2xl group-hover:scale-110 transition-transform">{joueur.statut}</span>
                                                        <span className="font-bold text-slate-200">{joueur.nom}</span>
                                                    </div>
                                                    <div className="flex items-center gap-2 bg-orange-500/10 px-3 py-1 rounded-lg border border-orange-500/20">
                                                        <span className="font-mono text-xl font-black text-orange-400">{joueur.whines}</span>
                                                        <FrownIcon className="w-5 h-5 text-orange-400" />
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB 7: RADIO PADDOCK */}
                            {activeTab === 'drama' && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <h2 className="text-2xl font-black text-white uppercase tracking-tight">Radio Paddock</h2>
                                            <p className="text-slate-400 text-sm">Messages de la direction de course et coups bas en direct.</p>
                                        </div>
                                    </div>

                                    <div className="space-y-4 border-l-2 border-slate-800 ml-4 pl-6 relative py-2">
                                        {paddockNews.map((news, i) => (
                                            <div key={i} className="relative group">
                                                <div className={`absolute -left-[31px] top-1 w-3 h-3 rounded-full border-2 border-slate-950 transition-transform group-hover:scale-125
                                                    ${news.type === 'drama' ? 'bg-red-500' : news.type === 'exploit' ? 'bg-emerald-500' : news.type === 'rookie' ? 'bg-blue-500' : 'bg-yellow-500'}
                                                `}></div>
                                                
                                                <div className="bg-slate-900 border border-slate-800 rounded-xl p-4 shadow-sm hover:border-slate-700 transition-colors">
                                                    <div className="flex items-center gap-2 mb-2">
                                                        <span className="text-xs font-bold text-slate-500">{news.time}</span>
                                                        <span className={`text-[10px] uppercase font-black px-2 py-0.5 rounded
                                                            ${news.type === 'drama' ? 'bg-red-500/10 text-red-500' : 
                                                            news.type === 'exploit' ? 'bg-emerald-500/10 text-emerald-400' : 
                                                            news.type === 'rookie' ? 'bg-blue-500/10 text-blue-400' :
                                                            'bg-yellow-500/10 text-yellow-400'}
                                                        `}>
                                                            {news.type}
                                                        </span>
                                                    </div>
                                                    <p className="text-slate-300 italic">"{news.text}"</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        // --- DEMARRAGE DE L'APPLICATION ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
