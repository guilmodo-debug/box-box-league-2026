                                                        <span className="text-xs font-bold text-slate-500">{news.time}</span>
                                                        <span className={`text-[10px] uppercase font-black px-2 py-0.5 rounded
                                                            ${news.type === 'drama' ? 'bg-red-500/10 text-red-500' : 
                                                            news.type === 'exploit' ? 'bg-emerald-500/10 text-emerald-400' : 
                                                            news.type === 'rookie' ? 'bg-blue-500/10 text-blue-400' :
                                                            'bg-yellow-500/10 text-yellow-400'}
                                                        `}>
                                                            {news.type}
                                                        </span>
                                                    </div>
                                                    <p className="text-slate-300 italic">"{news.text}"</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        // --- DEMARRAGE DE L'APPLICATION ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
